<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shri AI Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#140021,#2d0052,#4c1d95);
background-size:300% 300%;
animation:bgMove 12s ease infinite;
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.sidebar{
width:270px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border-right:1px solid rgba(255,255,255,.12);
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:30px;
font-weight:700;
color:#FFD166;
text-shadow:0 0 15px gold;
margin-bottom:25px;
}

.newchat{
padding:15px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#7c3aed,#a855f7);
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.newchat:hover{
transform:translateY(-3px);
box-shadow:0 0 20px #a855f7;
}

.history{
margin-top:25px;
flex:1;
overflow:auto;
}

.chat-item{
padding:14px;
margin-bottom:12px;
border-radius:14px;
background:rgba(255,255,255,.06);
transition:.3s;
cursor:pointer;
}

.chat-item:hover{
background:rgba(255,255,255,.14);
transform:translateX(6px);
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
height:75px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,.1);
}

.chat-area{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
}

.chat-area h1{
font-size:48px;
margin-bottom:15px;
background:linear-gradient(90deg,#fff,#f9a8d4,#fde68a);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.chat-area p{
font-size:18px;
opacity:.9;
max-width:600px;
line-height:1.8;
}

.input-area{
padding:20px;
display:flex;
gap:12px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(18px);
}

.input-area input{
flex:1;
padding:16px;
border:none;
border-radius:35px;
font-size:16px;
outline:none;
}

.input-area button{
width:60px;
border:none;
border-radius:50%;
background:#8B5CF6;
color:white;
font-size:22px;
cursor:pointer;
transition:.3s;
}

.input-area button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #8B5CF6;
}

@media(max-width:900px){

.sidebar{
display:none;
}

.chat-area h1{
font-size:36px;
}

}

</style>



</head>

<body>

<div class="sidebar">

<div class="logo">
🪷 Shri AI
</div>

<button class="newchat">
➕ New Chat
</button>

<div class="history">

<div class="chat-item">
💬 Welcome
</div>

<div class="chat-item">
📚 Study Help
</div>

<div class="chat-item">
💻 Coding
</div>

</div>

</div>

<div class="main">

<div class="topbar">

<h3>🌸 Shri AI</h3>

<div>
⚙️ 👤
</div>

</div>

<div class="chat-area">

<h1>🙏 Namaste</h1>

<p>I'm Shri, your Intelligent Indian AI Companion.</p>

</div>

<div class="input-area">

<input type="text" placeholder="Message Shri...">

<button>➤</button>

</div>

</div>

</body>
</html>
